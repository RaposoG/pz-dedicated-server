# ============================================
# Project Zomboid - Server Config (PVE Público)
# Build 42 Unstable
# ============================================
# Este arquivo é copiado como template no primeiro boot.
# Após o primeiro boot, edite diretamente no volume do container
# ou recrie o container para reaplicar.
# ============================================

# --- Rede ---
DefaultPort=16261
MaxPlayers=32
PingFrequency=10
PingLimit=400
UPnP=false
UPnPLeaseTime=86400
UPnPZeroLeaseTimeFallback=true
UPnPForce=true
UseTCPForMapDownloads=true

# --- Visibilidade Pública ---
Public=true
PublicName=PZ Server Brasil - PVE
PublicDescription=Servidor PVE com mods, sono ativado, loot respawn e muitos veiculos. Divirta-se!
Open=true
Password=

# --- PVP Desativado (PVE) ---
PVP=false
SafetySystem=true
ShowSafety=true
SafetyToggleTimer=2
SafetyCooldownTimer=3
PVPMeleeWhileHitReaction=false
PVPMeleeDamageModifier=30.0
PVPFirearmDamageModifier=50.0
PlayerBumpPlayer=false

# --- Sono ---
SleepAllowed=true
SleepNeeded=true

# --- Safehouse ---
PlayerSafehouse=true
AdminSafehouse=false
SafehouseAllowTrepass=true
SafehouseAllowFire=false
SafehouseAllowLoot=false
SafehouseAllowRespawn=true
SafehouseDaySurvivedToClaim=0
SafeHouseRemovalTime=168
DisableSafehouseWhenPlayerConnected=false

# --- Facções e Comércio ---
Faction=true
FactionDaySurvivedToCreate=0
FactionPlayersRequiredForTag=1
AllowTradeUI=true

# --- Chat ---
GlobalChat=true
ChatStreams=s,r,a,w,y,sh,f,all
ServerWelcomeMessage=Bem-vindo ao servidor PVE! <LINE> <LINE> Sono esta ativado - descanse quando estiver cansado! <LINE> Use /all para chat global, /f para faccao. <LINE> <LINE> Boa sorte sobrevivente!
DisplayUserName=true
ShowFirstAndLastName=true
MouseOverToSeeDisplayName=true
HidePlayersBehindYou=true

# --- Loot ---
HoursForLootRespawn=168
MaxItemsForLootRespawn=4
ConstructionPreventsLootRespawn=true
ItemNumbersLimitPerContainer=0

# --- Mundo ---
AllowDestructionBySledgehammer=true
NoFire=false
AnnounceDeath=true
MinutesPerPage=0.5
BloodSplatLifespanDays=0
HoursForWorldItemRemoval=0.0
WorldItemRemovalList=Base.Vest,Base.Shirt,Base.Blouse,Base.Skirt,Base.Shoes

# --- Respawn de Jogador ---
PlayerRespawnWithSelf=false
PlayerRespawnWithOther=false
DropOffWhiteListAfterDeath=false

# --- Servidor ---
PauseEmpty=true
SaveWorldEveryMinutes=10
DenyLoginOnOverloadedServer=true
DoLuaChecksum=true
AutoCreateUserInWhiteList=true
MaxAccountsPerUser=0
KickFastPlayers=false

# --- Veículos ---
CarEngineAttractionModifier=0.5
SpeedLimit=70.0
PhysicsDelay=500

# --- Spawn ---
SpawnPoint=0,0,0
SpawnItems=

# --- Voice ---
VoiceEnable=true
VoiceComplexity=5
VoicePeriod=20
VoiceSampleRate=24000
VoiceBuffering=8000
VoiceMinDistance=10.0
VoiceMaxDistance=100.0
Voice3D=true

# --- Steam ---
SteamScoreboard=true
SteamVAC=true
SteamPort1=8766
SteamPort2=8767

# --- RCON ---
RCONPort=27015
RCONPassword=

# --- Discord ---
DiscordEnable=false
DiscordToken=
DiscordChannel=
DiscordChannelID=

# --- Radio Staff ---
DisableRadioStaff=false
DisableRadioAdmin=true
DisableRadioGM=true
DisableRadioOverseer=false
DisableRadioModerator=false
DisableRadioInvisible=true

# --- Zombies Update ---
ZombieUpdateMaxHighPriority=50
ZombieUpdateDelta=0.5
ZombieUpdateRadiusLowPriority=45.0
ZombieUpdateRadiusHighPriority=10.0
TrashDeleteAll=false
RemovePlayerCorpsesOnCorpseRemoval=false
BanKickGlobalSound=true
AllowNonAsciiUsername=true
PlayerSaveOnDamage=true
SaveTransactionID=false
FastForwardMultiplier=40.0

# --- Mapa (base + mods de mapa) ---
Map=Muldraugh, KY

# --- Mods (preenchido automaticamente pelo entrypoint) ---
WorkshopItems=
Mods=
