services:
 zomboid-server:
  build: .
  container_name: pz-dedicated-server
  restart: unless-stopped
  stdin_open: true
  tty: true
  ports:
   - '16261:16261/udp'
   - '16262:16262/udp'
  volumes:
   # Arquivos do jogo (SteamCMD) - persiste entre restarts
   - pz-server-files:/home/pzuser/pzserver
   # Configurações, saves e logs
   - pz-config:/home/pzuser/Zomboid
  environment:
   # Build 42 unstable (deixe vazio para stable/public)
   - PZ_BETA_BRANCH=${PZ_BETA_BRANCH:-unstable}
   # Credenciais admin
   - PZ_ADMIN_USERNAME=${PZ_ADMIN_USERNAME:-admin}
   - PZ_ADMIN_PASSWORD=${PZ_ADMIN_PASSWORD:-changeme}
   # Nome do servidor
   - PZ_SERVER_NAME=${PZ_SERVER_NAME:-PZServer}
   # RAM (Build 42 recomenda 8g+)
   - PZ_JAVA_XMS=${PZ_JAVA_XMS:-4g}
   - PZ_JAVA_XMX=${PZ_JAVA_XMX:-8g}
   # Steam VAC
   - PZ_STEAM_VAC=${PZ_STEAM_VAC:-true}
   # Timezone
   - TZ=${TZ:-America/Sao_Paulo}

volumes:
 pz-server-files:
 pz-config:
